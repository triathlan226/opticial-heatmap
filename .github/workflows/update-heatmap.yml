name: Update heatmap prices

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 6"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild heatmap data
        env:
          SOURCE_CSV_URL: ${{ secrets.HEATMAP_SOURCE_CSV_URL }}
        run: |
          python scripts/update_heatmap_data.py \
            --companies data/companies.csv \
            --segments data/segments.csv \
            --output data.js \
            --report data/price_update_report.json

      - name: Commit updated data
        run: |
          if [ -n "$(git status --porcelain data.js data/price_update_report.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.js data/price_update_report.json
            git commit -m "Update heatmap weekly prices"
            git push
          else
            echo "No heatmap data changes."
          fi
